# ~/.config/hypr/hyprtoolkit.conf
# Nordfox theme

background = 0xFF2E3440   # nord0  – darkest bg
base       = 0xFF3B4252   # nord1  – base surface
text       = 0xFFD8DEE9   # nord4  – primary text
alternate_base = 0xFF434C5E  # nord2  – slightly lighter surface
bright_text    = 0xFFECEFF4  # nord6  – brightest text / snow storm

accent           = 0xFF88C0D0  # nord8  – light teal (primary accent)
accent_secondary = 0xFF81A1C1  # nord9  – muted blue (secondary accent)

h1_size        = 19
h2_size        = 15
h3_size        = 13
font_size      = 11
small_font_size = 10

# Optional – set your preferred icon theme
# icon_theme = Papirus-Dark
