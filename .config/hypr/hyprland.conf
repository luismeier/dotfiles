# See https://wiki.hyprland.org/Configuring/Keywords/ for more
source = $HOME/.config/hypr/env_variables.conf
 
# Set programs that you use
# $terminal = alacritty
# $terminal = wezterm
$terminal = kitty
$fileManager = dolphin
# fileManager = nautilus -w

source = ~/.config/hypr/active_monitor.conf
# source = ~/.config/hypr/workspaces.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/window_rules.conf


device {
  name = zsa-technology-labs-moonlander-mark-i
  kb_layout = us
  kb_variant = intl
}
device {
  name = go60-keyboard
  kb_layout = us
  kb_variant =intl
  
}

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = ch,us
    kb_variant = de
    kb_model =
    kb_options = grp:shifts_toggle 
    kb_rules =

    follow_mouse = 2

    touchpad {
        natural_scroll = true
        clickfinger_behavior = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    gaps_in = 2
    gaps_out = 2
    border_size = 3
    col.active_border = rgba(89dcebee) rgba(b4befeee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = master
    # layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
    resize_on_border = true
    extend_border_grab_area = 15
}

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 8
        passes = 1
        xray = false
        popups = true
        popups_ignorealpha = 0.2
    }

    shadow {
      enabled = true
      render_power = 3
      color = rgba(1a1a1aee)
      range = 2
    }
}

animations {
    enabled = yes

    # Fast, smooth bezier curves
    bezier = snappy, 0.25, 1, 0.5, 1
    bezier = softPop, 0.1, 0.9, 0.2, 1
    bezier = slideIn, 0.15, 0.85, 0.25, 1

    # Windows: quick fade + slight scale
    animation = windows, 1, 3, snappy, popin 85%
    animation = windowsIn, 1, 3, softPop, popin 88%
    animation = windowsOut, 1, 2, snappy, popin 80%
    animation = windowsMove, 1, 3, snappy

    # Fading: subtle and fast
    animation = fade, 1, 2, snappy
    animation = fadeIn, 1, 2, softPop
    animation = fadeOut, 1, 2, snappy

    # Borders
    animation = border, 1, 4, snappy
    animation = borderangle, 1, 4, snappy

    # Workspaces: quick horizontal slide
    animation = workspaces, 1, 3, slideIn, slide
    animation = specialWorkspace, 1, 3, softPop, slidevert
}

dwindle {
    preserve_split = true # don't change splits when resizing
    force_split = 2 # always split to the right
    default_split_ratio = 1.1
    pseudotile = true
}

master {
    new_status = slave
    new_on_top = true
    orientation = left
    mfact = 0.6
}
group {
    groupbar {
        # enable/disable group bar
        enabled = true

        # font settings
        font_family = "JetBrainsMono Nerd Font"
        font_size   = 13  # increase/decrease as you like
    }
}

# Gestures
gesture = 3, horizontal, workspace
gesture = 3, up, fullscreen
gesture = 3, horizontal, mod: SHIFT, move

misc {
    force_default_wallpaper = 0 # Set to 0 to disable the anime mascot wallpapers
    enable_swallow = true
    swallow_regex = ^(Alacritty|kitty|wezterm)$
    focus_on_activate = true
    # Only show application not responding after 10 missed pings
    anr_missed_pings = 50
}

cursor {
    no_hardware_cursors = 2 # 0 enabled, 1 disabled, 2 auto
  use_cpu_buffer = 2 # Should enable better cursor on nvidia
    persistent_warps = true
}

render {
    direct_scanout = false
    # new_render_scheduling = true
}
