# ── Tags ──────────────────────────────────────────────────────────────────────

windowrule {
  name = floating-window-properties
  float  = on
  center = on
  size   = 900 650
  match:tag = floating-window
}

windowrule {
  name = tag-floating-apps
  tag  = +floating-window
  match:class = (blueberry.py|wlctl|bluetui|Wiremix|org.gnome.NautilusPreviewer|com.gabm.satty|Omarchy|About|TUI.float)
}

windowrule {
  name = tag-floating-file-dialogs
  tag  = +floating-window
  match:class = (xdg-desktop-portal-gtk|sublime_text|DesktopEditors|org.gnome.Nautilus)
  match:title = ^(Open.*Files?|Open Folder|Save.*Files?|Save.*As|Save|All Files)
}

# ── Focus behavior ─────────────────────────────────────────────────────────────
windowrule {
  name = windowrule-4
  stay_focused = on
  focus_on_activate = on
  match:class = ^(Rofi)
}

# ── Workspace assignments ──────────────────────────────────────────────────────

windowrule {
  name      = ws-browser
  workspace = 1
  match:class = ^(org.mozilla.firefox)$
}

windowrule {
  name      = ws-files
  workspace = 4
  match:class = ^(thunar|org.kde.dolphin|org.gnome.Nautilus)$
}

windowrule {
  name      = ws-notes
  workspace = 7
  match:class = ^(obsidian|Logseq)$
}

windowrule {
  name      = ws-mail
  workspace = 8
  match:class = ^(org.gnome.Evolution|outlook-for-linux)$
}

windowrule {
  name      = ws-comms
  workspace = 9
  match:class = (?i)^.*(teams).*$
}

windowrule {
  name      = ws-media
  workspace = 10
  match:class = (?i)^.*(spotify|tidal|signal).*$
}

# ── Common modal dialogs (float) ───────────────────────────────────────────────

windowrule {
  name  = float-common-modals
  float = on
  match:title = ^(Open|Choose Files|Save As|Confirm to replace files|File Operation Progress)$
}

windowrule {
  name  = float-chrome-file-dialog
  float = on
  match:class = ^(google-chrome)$
  match:title = ^(Open File)$
}

# ── Floating + centered dialogs ────────────────────────────────────────────────

windowrule {
  name   = float-vpn-dialog
  float  = on
  center = on
  match:class = ^(nm-openconnect-auth-dialog)$
}

windowrule {
  name   = float-calculators
  float  = on
  center = on
  match:class = ^(org.kde.kcalc|org.gnome.Calculator)$
}

windowrule {
  name        = float-nextcloud
  float       = on
  center      = on
  stay_focused = on
  pin         = on
  match:class = (?i)^.*nextcloud.*$
}

windowrule {
  name   = float-evolution-alarm
  float  = on
  center = on
  match:class = ^(evolution-alarm-notify)$
}

windowrule {
  name   = float-bluetooth
  float  = on
  center = on
  match:class = ^(blueman-manager|bluetui)$
}

# ── impala (override tag size since it needs different dimensions) ─────────────

windowrule {
  name   = float-impala
  float  = on
  center = on
  size   = 950 600
  match:class = (?i)^(impala)$
}

# ── KiCad ─────────────────────────────────────────────────────────────────────

windowrule {
  name      = kicad-workspace
  workspace = 3
  match:class = ^(KiCad)$
}

windowrule {
  name  = kicad-properties-float
  float = on
  match:class = ^(KiCad)$
  match:title = ^.*Properties.*$
}

# ── FreeCAD ───────────────────────────────────────────────────────────────────

windowrule {
  name           = freecad-suppress
  suppress_event = maximize
  suppress_event = activatefocus
  no_initial_focus = on
  stay_focused   = off
  match:class    = ^(FreeCAD)$
}

windowrule {
  name             = freecad-prefs-float
  float            = on
  no_initial_focus = on
  match:class      = ^(FreeCAD)$
  match:title      = ^.*Preferences.*$
}

# ── hyprland-run ──────────────────────────────────────────────────────────────

windowrule {
  name  = move-hyprland-run
  float = on
  move  = 20 monitor_h-120
  match:class = ^(hyprland-run)$
}

# ── Global rules ──────────────────────────────────────────────────────────────

windowrule {
  name           = suppress-maximize-events
  suppress_event = maximize
  match:class    = .*
}

windowrule {
  name         = fix-xwayland-drags
  no_focus     = on
  match:class      = ^$
  match:title      = ^$
  match:xwayland   = true
  match:float      = true
  match:fullscreen = false
  match:pin        = false
}

# ── Layer rules ───────────────────────────────────────────────────────────────

layerrule {
  name         = vicinae-blur
  blur         = on
  ignore_alpha = 0
  match:namespace = vicinae
}

